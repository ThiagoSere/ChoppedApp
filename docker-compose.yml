services:
  postgres:
    image: postgres:16-alpine
    container_name: chopped_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chopped
    ports:
      - "5432:5432"
    volumes:
      - chopped_pg_data:/var/lib/postgresql/data

volumes:
  chopped_pg_data:
